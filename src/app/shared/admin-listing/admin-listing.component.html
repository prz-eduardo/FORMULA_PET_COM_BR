<div class="admin-listing" [class.loading]="loading">
  <header class="al-header">
    <div class="al-title">
      <ng-content select="[slot=title]"></ng-content>
      <span *ngIf="total !== null" class="al-total-badge" aria-label="Total de registros">
        <strong>{{ total }}</strong>
        <small *ngIf="totalLabel">{{ totalLabel }}</small>
      </span>
    </div>

    <div class="al-topbar">
      <div class="al-search">
        <ng-content select="[slot=search]"></ng-content>
      </div>
      <div class="al-actions">
        <ng-content select="[slot=actions]"></ng-content>
      </div>
    </div>
  </header>

  <div class="al-filters" *ngIf="showFilters">
    <ng-content select="[slot=filters]"></ng-content>
    <button *ngIf="showClearFilters" type="button" class="al-clear" (click)="emitClear()" title="Limpar filtros">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      Limpar
    </button>
  </div>

  <div class="al-body">
    <div class="al-table-wrap">
      <ng-content select="[slot=table]"></ng-content>
    </div>

    <div class="al-detail-wrap">
      <ng-content select="[slot=detail]"></ng-content>
    </div>
  </div>

  <div class="al-pagination">
    <ng-content select="[slot=pagination]"></ng-content>
  </div>
</div>
