<div class="banner-image-editor">
  <input #fileInput type="file" accept="image/*" (change)="onFileSelected($event)" style="display:none" />
  <div class="warn" *ngIf="warning">{{ warning }}</div>

  <div class="frame" #frame [style.height.px]="frameHeight" (pointerdown)="onPointerDown($event)" (wheel)="onWheel($event)" (dragover)="onFrameDragOver($event)" (dragleave)="onFrameDragLeave($event)" (drop)="onFrameDrop($event)" (click)="onFrameClick($event)">
    <div class="placeholder" *ngIf="!imageSrc">Arraste a imagem aqui ou clique (Ctrl+Scroll para zoom)</div>

    <div class="editor" *ngIf="imageSrc">
      <img #imgEl class="editor-img" [src]="imageSrc" draggable="false"
           [style.width.px]="naturalW * scale" [style.height.px]="naturalH * scale"
           [style.transform]="'translate('+posX+'px,'+posY+'px)'" />
    </div>
  </div>

  <div class="preview" *ngIf="previewData">
    <img [src]="previewData" alt="Preview" />
  </div>
</div>
