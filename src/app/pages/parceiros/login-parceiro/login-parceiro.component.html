<div class="login-page">
  <div class="login-card">
    <div class="brand">
      <span class="brand-icon">🐾</span>
      <h1 class="brand-name">PetSphere</h1>
      <p class="brand-sub">Portal do Parceiro</p>
    </div>

    <form class="login-form" (ngSubmit)="onSubmit()" novalidate>
      <div class="field">
        <label for="lp-email">E-mail</label>
        <input
          id="lp-email"
          type="email"
          autocomplete="email"
          placeholder="seu@petshop.com.br"
          [(ngModel)]="email"
          name="email"
          [disabled]="loading()"
        />
      </div>

      <div class="field">
        <label for="lp-pass">Senha</label>
        <input
          id="lp-pass"
          type="password"
          autocomplete="current-password"
          placeholder="••••••••"
          [(ngModel)]="password"
          name="password"
          [disabled]="loading()"
        />
      </div>

      <div class="login-error" *ngIf="error()">{{ error() }}</div>

      <button class="btn-login" type="submit" [disabled]="loading()">
        <span *ngIf="!loading()">Entrar</span>
        <span *ngIf="loading()" class="spinner"></span>
      </button>

      <p class="login-hint">
        Ainda não é parceiro?
        <a href="/parceiro/cadastrar">Cadastre-se</a>
      </p>
    </form>

    <div class="demo-hint">
      <span class="demo-badge">Demo</span>
      Use qualquer e-mail e senha. Inclua <code>clinic</code>,
      <code>hotel</code> ou <code>sitter</code> no e-mail para simular tipos diferentes.
    </div>
  </div>
</div>
