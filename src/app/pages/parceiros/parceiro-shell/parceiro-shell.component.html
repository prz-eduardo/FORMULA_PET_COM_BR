<div class="parceiro-wrapper">
  <header class="parceiro-header">
    <div class="header-brand">
      <span class="brand-icon">🐾</span>
      <span class="brand-name">PetSphere</span>
      <span class="tipo-badge">Parceiro</span>
    </div>

    <nav class="header-nav">
      <a routerLink="/parceiros/painel" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">
        <i class="fa fa-th-large"></i> Painel
      </a>
      <a routerLink="/parceiros/agenda" routerLinkActive="active">
        <i class="fa fa-calendar"></i> Agenda
      </a>
      <a routerLink="/parceiros/colaboradores" routerLinkActive="active">
        <i class="fa fa-users"></i> Colaboradores
      </a>
      <div class="nav-group" [class.open]="showVetMenu()">
        <button class="nav-group-btn" (click)="toggleVetMenu()" [class.active]="isVetActive()">
          <i class="fa fa-flask"></i> Área Vet <i class="fa fa-chevron-down nav-caret"></i>
        </button>
        <div class="nav-dropdown" *ngIf="showVetMenu()">
          <a routerLink="/parceiros/area-vet" routerLinkActive="active" (click)="toggleVetMenu(false)">
            <i class="fa fa-flask"></i> Ativos & Fórmulas
          </a>
          <a routerLink="/parceiros/gerar-receita" routerLinkActive="active" (click)="toggleVetMenu(false)">
            <i class="fa fa-file-text-o"></i> Prontuário do Atendimento
          </a>
          <a routerLink="/parceiros/historico-receitas" routerLinkActive="active" (click)="toggleVetMenu(false)">
            <i class="fa fa-history"></i> Histórico
          </a>
          <a routerLink="/parceiros/pacientes" routerLinkActive="active" (click)="toggleVetMenu(false)">
            <i class="fa fa-paw"></i> Pacientes
          </a>
        </div>
      </div>
    </nav>

    <div class="header-actions">
      <div class="tipo-switcher">
        <button class="btn-user" (click)="toggleUserMenu()">
          <span class="user-nome">{{ colaborador()?.nome ?? 'Colaborador' }}</span>
          <span class="caret">▾</span>
        </button>
        <div class="user-menu" *ngIf="showUserMenu()">
          <div class="menu-section-label">Conta</div>
          <div class="menu-user-info">
            <div class="user-email">{{ colaborador()?.email }}</div>
            <div class="user-role">
              {{ colaborador()?.role === 'master' ? '👑 Master' : '👤 Colaborador' }}
            </div>
          </div>
          <div class="menu-divider"></div>
          <button (click)="goToPainel(); toggleUserMenu(false)"><i class="fa fa-th-large"></i> Painel</button>
          <button class="danger" (click)="logout(); toggleUserMenu(false)"><i class="fa fa-sign-out"></i> Sair</button>
        </div>
      </div>
    </div>
  </header>

  <main class="parceiro-main">
    <router-outlet></router-outlet>
  </main>
</div>
