<div class="parceiro-wrapper">
  <header class="parceiro-header">
    <div class="header-brand">
      <span class="brand-icon">🐾</span>
      <span class="brand-name">PetSphere</span>
      <span class="tipo-badge" *ngIf="parceiro()">{{ tipoLabel() }}</span>
    </div>

    <nav class="header-nav">
      <a routerLink="/parceiros/agenda" routerLinkActive="active">Agenda</a>
    </nav>

    <div class="header-actions">
      <!-- Demo: switch partner type -->
      <div class="tipo-switcher" [class.open]="showUserMenu()">
        <button class="btn-user" (click)="toggleUserMenu()">
          <span class="user-nome">{{ parceiro()?.nome ?? 'Parceiro' }}</span>
          <span class="caret">▾</span>
        </button>
        <div class="user-menu" *ngIf="showUserMenu()">
          <div class="menu-section-label">Simular tipo</div>
          <button (click)="switchTipo('PETSHOP')">🛁 PetShop</button>
          <button (click)="switchTipo('CLINIC')">🩺 Clínica Vet.</button>
          <button (click)="switchTipo('SITTER')">🏠 Pet Sitter</button>
          <button (click)="switchTipo('HOTEL')">🏨 Hotel</button>
          <div class="menu-divider"></div>
          <button class="danger" (click)="logout()">Sair</button>
        </div>
      </div>
    </div>
  </header>

  <main class="parceiro-main">
    <router-outlet></router-outlet>
  </main>
</div>
