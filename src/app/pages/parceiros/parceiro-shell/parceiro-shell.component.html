<div class="parceiro-wrapper">
  <header class="parceiro-header">
    <div class="header-brand">
      <span class="brand-icon">🐾</span>
      <span class="brand-name">PetSphere</span>
    </div>

    <nav class="header-nav">
      <a routerLink="/parceiros/agenda" routerLinkActive="active">Agenda</a>
    </nav>

    <div class="header-actions">
      <div class="user-menu-wrapper">
        <button class="btn-user" (click)="toggleUserMenu()">
          <span class="user-nome">{{ colaborador()?.nome ?? 'Colaborador' }}</span>
          <span class="caret">▾</span>
        </button>
        <div class="user-menu" *ngIf="showUserMenu()">
          <div class="menu-user-info">
            <div class="user-email">{{ colaborador()?.email }}</div>
            <div class="user-role">{{ colaborador()?.role === 'master' ? '👑 Master' : '👤 Colaborador' }}</div>
          </div>
          <div class="menu-divider"></div>
          <button class="danger" (click)="logout()">Sair</button>
        </div>
      </div>
    </div>
  </header>

  <main class="parceiro-main">
    <router-outlet></router-outlet>
  </main>
</div>
