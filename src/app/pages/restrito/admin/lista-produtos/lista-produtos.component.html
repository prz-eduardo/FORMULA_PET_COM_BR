<!-- lista-produtos.component.html (wrapped with app-admin-crud) -->
<app-admin-crud
  [items]="produtos"
  [loading]="loading"
  [total]="total"
  [page]="page"
  [pageSize]="pageSize"
  [columns]="columns"
  [formSchema]="productFormSchema"
  [formTitle]="'Produto'"
  [formSubmitLabel]="'Salvar'"
  [useDefaultActions]="true"
  (pageChange)="page = $event; loadProdutos()"
  (create)="addProduto()"
  (edit)="openDrawer($event)"
  (remove)="onRemove($event)"
  (submit)="onFormSubmit($event)"
  (cancel)="closeDrawer()"
  (toggleActive)="toggleActive($event)"
  [drawerOpen]="drawerOpen"
  (drawerOpenChange)="drawerOpen = $event"
  [editItem]="drawerEditItem"
>
</app-admin-crud>

<!-- Remoção agora é tratada via (remove) do app-admin-crud ou via deleteProduto() direto (com confirm) -->
