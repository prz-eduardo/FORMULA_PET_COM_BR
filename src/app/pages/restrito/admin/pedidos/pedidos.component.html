<app-admin-crud
  [columns]="ordersColumns"
  [items]="items"
  [loading]="loading"
  [page]="page"
  [pageSize]="pageSize"
  [total]="total"
  [drawerOpen]="selected != null"
  (drawerOpenChange)="onDrawerOpenChange($event)"
  [drawerFull]="drawerFull"
  (pageChange)="page = $event; load()"
  (edit)="openDetails($event)"
  (quickSearch)="onQuickSearch($event)"
  [useDefaultSearch]="true"
  [searchPlaceholder]="'Buscar por ID/cliente'"
  (customAction)="onCustomAction($event)">


  <div slot="title"><h2>Pedidos</h2></div>

  <admin-pagination slot="pagination" [page]="page" [total]="total" [pageSize]="pageSize" (pageChange)="page = $event; load()"></admin-pagination>

  <div slot="drawer">
    <div *ngIf="selected">
      <app-order-details *ngIf="selected"
        [order]="selected"
        [mode]="drawerFull ? 'full' : 'compact'"
        (expand)="onExpandDetails()"
        (collapse)="onCollapseDetails()"
        (statusChange)="setStatus($event)"
        (cancel)="cancelarPedido()"
        (close)="backToList()"
      ></app-order-details>

      <app-confirm-cancel-modal *ngIf="showCancelModal" (confirm)="confirmCancel($event)" (cancel)="showCancelModal = false"></app-confirm-cancel-modal>

      <!-- Order edit removed: edit UI disabled per request -->
    </div>
  </div>

</app-admin-crud>
