<div class="fornec-wrap">
  <app-admin-crud
    [items]="items()"
    [loading]="loading()"
    [total]="total()"
    [page]="page()"
    [pageSize]="pageSize()"
    [columns]="columns"
    [drawerOpen]="showCreate() || !!selected()"
    [drawerWidth]="'520px'"
    (drawerOpenChange)="onDrawerOpenChange($event)"
    (pageChange)="page.set($event); load()"
    (edit)="onCrudEdit($event)"
    (create)="onCrudCreate()"
    (remove)="removeItem($event)"
    [formSchema]="bannerFormSchema"
    (submit)="onSchemaSubmit($event)"
  >
    <div slot="title">
      <h2>Banners</h2>
    </div>

    <div slot="actions">
      <button class="primary" (click)="openCreate()">Novo</button>
    </div>

    <div slot="drawer" *ngIf="selected() || showCreate()">
        <div class="drawer-content">
          <form [formGroup]="selected() ? form : createForm" (ngSubmit)="selected() ? save() : create()" class="admin-form-grid">
          <div class="form-row">
            <div class="form-group">
              <label for="nome">Nome</label>
              <input id="nome" formControlName="nome" class="basico-input" placeholder="Nome do banner" />
            </div>
            <div class="form-group">
              <label for="link">Link</label>
              <input id="link" formControlName="link" class="basico-input" placeholder="https://" />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="alt">Alt</label>
              <input id="alt" formControlName="alt" class="basico-input" placeholder="Texto alternativo" />
            </div>
            <div class="form-group">
              <label for="posicao">Posição</label>
              <select id="posicao" formControlName="posicao" class="basico-input">
                <option value="loja">Loja</option>
              </select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="ordem">Ordem</label>
              <input id="ordem" type="number" formControlName="ordem" class="basico-input" min="1" />
            </div>
            <div class="form-group">
              <label for="inicio">Início</label>
              <input id="inicio" type="datetime-local" formControlName="inicio" class="basico-input" />
            </div>
            <div class="form-group">
              <label for="fim">Fim</label>
              <input id="fim" type="datetime-local" formControlName="fim" class="basico-input" />
            </div>
            <div class="form-group">
              <label for="ativo">Status</label>
              <select id="ativo" formControlName="ativo" class="basico-input">
                <option [ngValue]="1">Ativo</option>
                <option [ngValue]="0">Inativo</option>
              </select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group full-width">
              <label>Banner Desktop (4:1)</label>
              <div>
                <ng-container *ngIf="!showCreate(); else createDesktopEditor">
                  <app-banner-image-editor #desktopEditor [expectedRatio]="desktopExpected" [initialImage]="desktopPreviewUrl" (previewChange)="desktopPreviewUrl=$event" (fileChange)="desktopFile=$event" (warnChange)="desktopWarn.set($event)"></app-banner-image-editor>
                </ng-container>
                <ng-template #createDesktopEditor>
                  <app-banner-image-editor #desktopEditorCreate [expectedRatio]="desktopExpected" [initialImage]="desktopPreviewUrl" (previewChange)="desktopPreviewUrl=$event" (fileChange)="desktopFile=$event" (warnChange)="desktopWarn.set($event)"></app-banner-image-editor>
                </ng-template>
              </div>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group full-width">
              <label>Banner Mobile (4:1)</label>
              <div>
                <ng-container *ngIf="!showCreate(); else createMobileEditor">
                  <app-banner-image-editor #mobileEditor [expectedRatio]="mobileExpected" [initialImage]="mobilePreviewUrl" (previewChange)="mobilePreviewUrl=$event" (fileChange)="mobileFile=$event" (warnChange)="mobileWarn.set($event)"></app-banner-image-editor>
                </ng-container>
                <ng-template #createMobileEditor>
                  <app-banner-image-editor #mobileEditorCreate [expectedRatio]="mobileExpected" [initialImage]="mobilePreviewUrl" (previewChange)="mobilePreviewUrl=$event" (fileChange)="mobileFile=$event" (warnChange)="mobileWarn.set($event)"></app-banner-image-editor>
                </ng-template>
              </div>
            </div>
          </div>
          <div class="drawer-actions">
            <button type="button" class="ghost" (click)="onCrudCancel()">Cancelar</button>
            <button type="submit" class="primary" [disabled]="(selected() ? form : createForm).invalid">{{ selected() ? 'Salvar' : 'Criar' }}</button>
          </div>
        </form>
      </div>
    </div>

    <div slot="pagination">
      <admin-pagination [page]="page()" [total]="total()" [pageSize]="pageSize()" (pageChange)="page.set($event); load()"></admin-pagination>
    </div>
  </app-admin-crud>
