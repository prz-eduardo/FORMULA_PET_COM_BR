<app-admin-crud
  [columns]="ativosColumns"
  [formSchema]="ativosFormSchema"
  [editItem]="selected()"
  [items]="items()"
  [loading]="loading()"
  [page]="page()"
  [pageSize]="pageSize()"
  [total]="total()"
  [drawerOpen]="(selected() !== null) || showCreate()"
  (drawerOpenChange)="onDrawerOpenChange($event)"
  (pageChange)="page.set($event); load()"
  (edit)="view($event)"
  (create)="openCreateForSchema()"
  (remove)="removeFromTable($event)"
  (submit)="onSchemaSubmit($event)"
  [useDefaultActions]="true"
  [createLabel]="'Novo Ativo'">

  
  <input slot="search" class="search-input" type="text" placeholder="Buscar por nome ou descrição" (input)="onQ($event)" aria-label="Buscar ativos" />
  <div slot="actions"></div>

  <admin-pagination slot="pagination" [page]="page()" [total]="total()" [pageSize]="pageSize()" (pageChange)="page.set($event); load()"></admin-pagination>

</app-admin-crud>
