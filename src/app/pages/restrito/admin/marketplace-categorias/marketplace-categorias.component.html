<div class="mkt-tax-wrap admin-page-wrap">
  <app-admin-crud
    [items]="list()"
    [loading]="loadingList()"
    [total]="total()"
    [page]="page()"
    [pageSize]="pageSize()"
    [drawerOpen]="drawerOpen()"
    [drawerWidth]="'520px'"
    [drawerTitle]="editingId() ? 'Editar categoria' : 'Nova categoria'"
    [drawerShowFooter]="true"
    [drawerPrimaryLabel]="editingId() ? 'Salvar alterações' : 'Criar categoria'"
    [drawerPrimaryLoading]="submitting()"
    (drawerOpenChange)="onDrawerOpenChange($event)"
    (drawerPrimaryAction)="submitCategoria()"
    (drawerSecondaryAction)="closeDrawer()"
    (pageChange)="page.set($event)"
    (edit)="editarCategoria($event)"
    (create)="novaCategoria()"
    (remove)="remover($event)"
    [useDefaultActions]="true"
    [createLabel]="'Nova categoria'"
    [useDefaultSearch]="true"
    [searchPlaceholder]="'Buscar por nome, slug, ícone ou ID…'"
    (quickSearch)="onQuickSearch($event)">

    <div slot="search">
      <div class="filters">
        <button class="admin-btn outline" type="button" (click)="loadList()">Atualizar</button>
      </div>
    </div>

    <section slot="table" class="table-wrap" *ngIf="!loadingList(); else loadingTpl" tabindex="-1">
      <table class="admin-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Slug</th>
            <th>Ícone</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let c of list()">
            <td>{{ c.id }}</td>
            <td>{{ c.nome }}</td>
            <td>{{ c.slug || '—' }}</td>
            <td><span class="muted">{{ c.icone || '—' }}</span></td>
            <td class="actions-cell">
              <button type="button" class="admin-btn ghost small table-action" (click)="editarCategoria(c)">
                <svg class="table-action__ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
                Detalhes
              </button>
              <button type="button" class="admin-btn danger small table-action" (click)="remover(c)">
                <svg class="table-action__ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2M10 11v6M14 11v6"/>
                </svg>
                Remover
              </button>
            </td>
          </tr>
          <tr *ngIf="!list().length">
            <td colspan="5">
              <div class="admin-empty">Nenhuma categoria encontrada.</div>
            </td>
          </tr>
        </tbody>
      </table>
    </section>
    <admin-pagination slot="pagination" [page]="page()" [total]="total()" [pageSize]="pageSize()" (pageChange)="page.set($event)"></admin-pagination>
    <ng-template #loadingTpl><div class="admin-empty">Carregando...</div></ng-template>

    <form slot="drawer" *ngIf="drawerOpen()" [formGroup]="categoriaForm" class="fx-drawer" (ngSubmit)="submitCategoria()" novalidate>
      <section class="fx-section">
        <header class="fx-section__head fx-section__head--actions">
          <div>
            <h3>Dados da categoria</h3>
            <p>Nome, slug e ícone usados na vitrine e filtros.</p>
          </div>
          <div class="fx-section__actions" *ngIf="editingId()">
            <button type="button" class="fx-btn danger small" (click)="removerEditando()">Remover</button>
          </div>
        </header>
        <label class="fx-field">
          <span>Nome</span>
          <input type="text" formControlName="nome" placeholder="Ex.: Vitaminas" autocomplete="off" />
        </label>
        <label class="fx-field">
          <span>Slug</span>
          <input type="text" formControlName="slug" placeholder="opcional" autocomplete="off" />
        </label>
        <label class="fx-field">
          <span>Ícone</span>
          <input type="text" formControlName="icone" placeholder="mdi-..." autocomplete="off" />
        </label>
      </section>
    </form>
  </app-admin-crud>
</div>
