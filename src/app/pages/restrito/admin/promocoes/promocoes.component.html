<app-admin-crud
  [items]="list()"
  [loading]="loadingList()"
  [total]="total()"
  [page]="page()"
  [pageSize]="pageSize()"
  [drawerOpen]="showCreateModal() || !!editingId()"
  (drawerOpenChange)="onDrawerOpenChange($event)"
  (pageChange)="page.set($event); loadList()"
  (edit)="editarPromocao($event)"
  (create)="novaPromocao()"
  (remove)="remover($event)"
  [useDefaultActions]="true"
  [createLabel]="'Nova promoção'"
  [useDefaultSearch]="true"
  [searchPlaceholder]="'Buscar por nome/descrição'"
  (quickSearch)="q.set($event); loadList()"
  [formSchema]="promocoesFormSchema"
  [editItem]="editingItem"
  (submit)="onSchemaSubmit($event)"
  (cancel)="closeCreateModal()">

  <div slot="title"><h1>Promoções</h1></div>

  <div slot="search">
    <div class="filters">
      <select [value]="active()" (change)="onActiveChange($event)">
        <option value="all">Todos</option>
        <option value="1">Ativos</option>
        <option value="0">Inativos</option>
      </select>
      <button class="outline" (click)="loadList()">Atualizar</button>
    </div>
  </div>

  <section slot="table" class="table-wrap" *ngIf="!loadingList(); else loadingTpl" #listRef tabindex="-1">
    <table class="table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Nome</th>
          <th>Tipo</th>
          <th>Valor</th>
          <th>Status</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let p of list()">
          <td>{{ p.id }}</td>
          <td>{{ p.nome }}</td>
          <td>{{ p.tipo || 'percentual' }}</td>
          <td>{{ formatValor(p) }}</td>
          <td><span [class.ok]="statusClass(p)==='ok'" [class.info]="statusClass(p)==='info'" [class.warn]="statusClass(p)==='warn'" [class.off]="statusClass(p)==='off'" [class.muted]="statusClass(p)==='muted'">{{ statusLabel(p) }}</span></td>
          <td>
            <button class="btn secondary" (click)="editarPromocao(p)">Editar</button>
            <button class="btn danger" (click)="remover(p)">Remover</button>
          </td>
        </tr>
      </tbody>
    </table>
    <admin-pagination slot="pagination" [page]="page()" [total]="total()" [pageSize]="pageSize()" (pageChange)="page.set($event); loadList()"></admin-pagination>
  </section>
  <ng-template #loadingTpl><div class="empty">Carregando...</div></ng-template>

  <!-- Using auto-generated schema-driven drawer (no projected drawer content) -->

</app-admin-crud>
