<div class="mk-wrapper admin-page-wrap">
  <app-admin-toolbar>
    <div slot="title">
      <h2>Categorias &amp; Tags</h2>
      <p class="sub">Gerencie categorias e tags usadas na vitrine e filtros.</p>
    </div>
    <div slot="actions">
      <button class="admin-btn danger" type="button" (click)="bulkDeleteSelected()" [disabled]="!areAnySelected()">Excluir selecionados</button>
      <button class="admin-btn secondary" type="button" (click)="bulkDisableSelected()" [disabled]="!areAnySelected()">Desativar selecionados</button>
      <button class="admin-btn ghost" type="button" (click)="load()" [disabled]="loading()">{{ loading() ? 'Atualizando…' : 'Atualizar' }}</button>
      <button class="admin-btn ok" type="button" (click)="save()" [disabled]="saving()">{{ saving() ? 'Salvando...' : 'Salvar alterações' }}</button>
    </div>
  </app-admin-toolbar>

  <div class="mk-grid">
    <section class="admin-surface mk-section">
      <div class="section-head">
        <h3>Categorias</h3>
        <div class="section-head-tools">
          <label class="select-all">
            <input type="checkbox" [checked]="areAllSelectedCategories()" (change)="toggleSelectAllCategories($any($event.target).checked)" />
            Selecionar todas
          </label>
          <button class="admin-btn small" type="button" (click)="addCategoria()">+ Adicionar</button>
        </div>
      </div>

      <div class="admin-empty" *ngIf="!categorias.length">Nenhuma categoria ainda.</div>

      <div class="list" *ngIf="categorias.length">
        <div class="row"
             *ngFor="let c of categorias.controls; let i = index"
             [formGroup]="$any(c)"
             [class.marked-for-delete]="$any(c.get('remove')?.value)"
             [class.disabled]="$any(c.get('disabled')?.value)">
          <div class="admin-field tiny center">
            <label>Sel</label>
            <input type="checkbox" formControlName="selected" />
          </div>
          <div class="admin-field small">
            <label>ID</label>
            <input type="text" formControlName="id" placeholder="novo" [readonly]="true" />
          </div>
          <div class="admin-field grow">
            <label>Nome</label>
            <input type="text" formControlName="nome" placeholder="Ex.: Vitaminas" />
          </div>
          <div class="admin-field">
            <label>Slug</label>
            <input type="text" formControlName="slug" placeholder="opcional" />
          </div>
          <div class="admin-field">
            <label>Ícone</label>
            <input type="text" formControlName="icone" placeholder="mdi-..." />
          </div>
          <div class="admin-field small center">
            <label>&nbsp;</label>
            <button type="button" class="admin-btn danger small" (click)="removeCategoria(i)">Excluir</button>
          </div>
        </div>
      </div>
    </section>

    <section class="admin-surface mk-section">
      <div class="section-head">
        <h3>Tags</h3>
        <div class="section-head-tools">
          <label class="select-all">
            <input type="checkbox" [checked]="areAllSelectedTags()" (change)="toggleSelectAllTags($any($event.target).checked)" />
            Selecionar todas
          </label>
          <button class="admin-btn small" type="button" (click)="addTag()">+ Adicionar</button>
        </div>
      </div>

      <div class="admin-empty" *ngIf="!tags.length">Nenhuma tag ainda.</div>

      <div class="list" *ngIf="tags.length">
        <div class="row"
             *ngFor="let t of tags.controls; let i = index"
             [formGroup]="$any(t)"
             [class.marked-for-delete]="$any(t.get('remove')?.value)"
             [class.disabled]="$any(t.get('disabled')?.value)">
          <div class="admin-field tiny center">
            <label>Sel</label>
            <input type="checkbox" formControlName="selected" />
          </div>
          <div class="admin-field small">
            <label>ID</label>
            <input type="text" formControlName="id" placeholder="novo" [readonly]="true" />
          </div>
          <div class="admin-field grow">
            <label>Nome</label>
            <input type="text" formControlName="nome" placeholder="Ex.: pet-idoso" />
          </div>
          <div class="admin-field small center">
            <label>&nbsp;</label>
            <button type="button" class="admin-btn danger small" (click)="removeTag(i)">Excluir</button>
          </div>
        </div>
      </div>
    </section>
  </div>

  <div class="feedback">
    <span class="ok" *ngIf="success()">{{ success() }}</span>
    <span class="err" *ngIf="error()">{{ error() }}</span>
  </div>
</div>
