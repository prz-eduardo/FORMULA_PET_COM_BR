<div class="modal-login-wrapper">
	<h2 id="login-cliente-titulo">Login Cliente</h2>

	<p class="error-message" *ngIf="mensagemErro" role="alert">{{ mensagemErro }}</p>

	<form
		*ngIf="!iniciadoGoogle"
		#f="ngForm"
		(ngSubmit)="loginEmail(f)"
		class="login-form"
		[attr.aria-busy]="carregando"
		aria-labelledby="login-cliente-titulo"
	>
		<div class="form-group">
			<label for="cli-login-email">Email</label>
			<input
				id="cli-login-email"
				type="email"
				name="email"
				ngModel
				required
				placeholder="seu@email.com"
				autocomplete="email"
				[disabled]="carregando"
			/>
		</div>

		<div class="form-group">
			<label for="cli-login-senha">Senha</label>
			<div class="senha-input-wrap">
				<input
					id="cli-login-senha"
					[type]="mostrarSenha ? 'text' : 'password'"
					name="senha"
					ngModel
					required
					placeholder="Sua senha"
					autocomplete="current-password"
					class="input-senha"
					[disabled]="carregando"
				/>
				<button
					type="button"
					class="toggle-senha"
					(click)="mostrarSenha = !mostrarSenha"
					[disabled]="carregando"
					[attr.aria-pressed]="mostrarSenha"
					[attr.aria-label]="mostrarSenha ? 'Ocultar senha' : 'Mostrar senha'"
				>
					<svg *ngIf="!mostrarSenha" class="icone-olho" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
						<path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
						<path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
					</svg>
					<svg *ngIf="mostrarSenha" class="icone-olho" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
						<path d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.878 9.878l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m13.421 13.421L21 21" />
					</svg>
				</button>
			</div>
		</div>

		<div class="login-options-row">
			<label class="manter-login">
				<input type="checkbox" name="manterLogin" [(ngModel)]="manterLogin" [disabled]="carregando" />
				<span>Manter conectado</span>
			</label>
			<button type="button" class="link-esqueci" (click)="resetSenha(f.value.email)">
				Esqueci minha senha
			</button>
		</div>

		<button class="btn btn-submit" type="submit" [disabled]="f.invalid || carregando">
			{{ carregando ? 'Entrando…' : 'Entrar' }}
		</button>
	</form>

	<div class="login-divider" *ngIf="!iniciadoGoogle" role="separator" aria-orientation="horizontal">
		<span>ou</span>
	</div>

	<button
		type="button"
		class="btn-google-toggle"
		(click)="loginGoogle()"
		*ngIf="!iniciadoGoogle"
		[disabled]="carregando"
	>
		<img src="/imagens/google.png" alt="" class="g-img" width="24" height="24" />
		Entrar com Google
	</button>
</div>
