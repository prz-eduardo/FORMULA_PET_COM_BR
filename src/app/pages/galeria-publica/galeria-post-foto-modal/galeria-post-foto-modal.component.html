<div
  class="gpf-overlay"
  [class.gpf-overlay--embedded]="embedded"
  *ngIf="open"
  (click)="!embedded && close()"
  role="presentation"
  [attr.aria-hidden]="embedded ? null : 'false'"
>
  <div
    class="gpf-dialog"
    [class.gpf-dialog--embedded]="embedded"
    [attr.role]="embedded ? null : 'dialog'"
    [attr.aria-modal]="embedded ? null : 'true'"
    aria-labelledby="gpf-title"
    (click)="$event.stopPropagation()"
  >
    <div class="gpf-head" *ngIf="!embedded">
      <h2 id="gpf-title" class="gpf-title">Postar nova foto</h2>
      <button type="button" class="gpf-x" (click)="close()" [attr.aria-label]="embedded ? 'Voltar' : 'Fechar'">×</button>
    </div>
    <p class="gpf-hint" [class.gpf-hint--embedded]="embedded">O primeiro pet da lista é o <strong>principal</strong> na galeria. Marque todos que aparecem na foto.</p>

    <form (ngSubmit)="submit($event)" class="gpf-form" [class.gpf-form--embedded]="embedded">
      <div class="gpf-section" [class.gpf-section--card]="embedded">
        <span class="gpf-label">Quem aparece na foto?</span>
        <div *ngIf="loadingPets" class="gpf-loading">Carregando seus pets…</div>
        <ul *ngIf="!loadingPets && pets.length" class="gpf-pet-list" role="list">
          <li *ngFor="let p of pets" class="gpf-pet-item">
            <button
              type="button"
              class="gpf-pet-chip"
              [class.gpf-pet-chip--selected]="isSelected(p.id)"
              [attr.aria-pressed]="isSelected(p.id)"
              [attr.aria-label]="(isSelected(p.id) ? 'Remover ' : 'Selecionar ') + (p.nome || 'pet')"
              (click)="togglePet(p.id)"
            >
              <span class="gpf-pet-bubble" aria-hidden="true">
                <ng-container *ngIf="resolvePetAvatar(p) as petAvatar; else petInitial">
                  <img [src]="petAvatar" alt="" />
                </ng-container>
                <ng-template #petInitial>
                  <span class="gpf-pet-bubble__initials">{{ petInitials(p.nome) }}</span>
                </ng-template>
                <span *ngIf="selectionIndex(p.id)" class="gpf-pet-bubble__order">{{ selectionIndex(p.id) }}</span>
              </span>
              <span class="gpf-pet-copy">
                <span class="gpf-pet-nome">{{ p.nome || 'Sem nome' }}</span>
                <span class="gpf-pet-raca" *ngIf="petMeta(p)">{{ petMeta(p) }}</span>
                <span
                  *ngIf="p.exibir_galeria_publica != 1 && p.exibir_galeria_publica !== true && p.exibir_galeria_publica !== '1'"
                  class="gpf-pet-gallery-badge"
                  title="Este pet será habilitado para a galeria ao publicar a foto"
                >+ galeria</span>
              </span>
            </button>
          </li>
        </ul>
        <div *ngIf="!loadingPets && !pets.length" class="gpf-empty-card">
          <p class="gpf-empty">Você ainda não tem pets cadastrados para marcar na foto.</p>
          <button type="button" class="gpf-inline-cta" (click)="openNovoPet()">Cadastrar meu primeiro pet</button>
        </div>
        <p *ngIf="selectedOrder.length" class="gpf-order-hint">Ordem: {{ orderNames() }} (o primeiro é o pet principal no feed)</p>
      </div>

      <div class="gpf-section" [class.gpf-section--card]="embedded">
        <label class="gpf-label" [attr.for]="fileInputId()">Imagem</label>
        <div class="gpf-file-row">
          <label class="gpf-file-picker" [attr.for]="fileInputId()">Escolher imagem</label>
          <span class="gpf-filename" [class.gpf-filename--placeholder]="!file">{{ fileLabel() }}</span>
        </div>
        <input
          class="gpf-file-input"
          [attr.id]="fileInputId()"
          [attr.name]="'foto-' + fileInputReset"
          type="file"
          accept="image/*"
          (change)="onFileInput($event)"
        />
      </div>

      <div class="gpf-actions">
        <button type="button" class="gpf-btn gpf-btn--ghost" (click)="close()" [disabled]="submitting">Cancelar</button>
        <button
          type="submit"
          class="gpf-btn gpf-btn--primary"
          [disabled]="submitting || loadingPets || !pets.length"
        >
          {{ submitting ? 'Enviando…' : 'Publicar' }}
        </button>
      </div>
    </form>
  </div>
</div>
