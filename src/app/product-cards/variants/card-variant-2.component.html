<ng-template #content>
  <div class="hero" [style.aspectRatio]="imageAspect">
    <img [src]="displayImage" [alt]="product.name" loading="lazy" decoding="async" />
  </div>
  <div class="box-content">
    <button class="buy" type="button" (click)="onAddClick($event)">+</button>
    <div class="title">{{ product.name }}</div>
    <div class="desc">{{ product.category }}<span *ngIf="showMarca"> • {{ product.marca }}</span></div>
    <span class="price">{{ priceNow | currency:'BRL' }}</span>
  </div>
</ng-template>

<div *ngIf="disableLink" class="v2" [style.max-width]="cardWidth">
  <ng-container *ngTemplateOutlet="content"></ng-container>
</div>
<a *ngIf="!disableLink" class="v2" [routerLink]="['/produto', product.id]" [queryParams]="{ src: 'loja' }" [style.max-width]="cardWidth">
  <ng-container *ngTemplateOutlet="content"></ng-container>
</a>
