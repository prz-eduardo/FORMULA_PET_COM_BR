<ng-template #content>
  <div class="head">
    <span class="tag">New</span>
    <div class="hero" [style.aspectRatio]="imageAspect">
      <img [src]="displayImage" [alt]="product.name" loading="lazy" decoding="async" />
    </div>
  </div>
  <div class="body">
    <span class="title">{{ product.name }}</span>
    <span class="caption">{{ product.category || 'Linha premium' }}</span>
    <div class="rating" *ngIf="supportsRatings">
      <span *ngFor="let s of stars; let i = index">{{ i + 1 <= ratingValue ? '★' : '☆' }}</span>
    </div>
    <div class="actions">
      <button class="fav" *ngIf="supportsFavorites" type="button" (click)="onFavClick($event)">❤</button>
      <button class="cart" type="button" (click)="onAddClick($event)">{{ priceNow | currency:'BRL' }}</button>
    </div>
  </div>
</ng-template>

<article *ngIf="disableLink" class="v4" [style.max-width]="cardWidth"><ng-container *ngTemplateOutlet="content"></ng-container></article>
<a *ngIf="!disableLink" class="v4" [routerLink]="['/produto', product.id]" [queryParams]="{ src: 'loja' }" [style.max-width]="cardWidth"><ng-container *ngTemplateOutlet="content"></ng-container></a>
