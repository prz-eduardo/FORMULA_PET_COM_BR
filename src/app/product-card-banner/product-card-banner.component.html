<ng-template #bannerInner>
  <div class="pcb-media" [style.min-height.px]="minHeightPx">
    <img [src]="product.image || product.imageUrl || '/imagens/image.png'" [alt]="product.name" loading="lazy" decoding="async" class="pcb-img" />
    <div class="pcb-overlay" [style.opacity]="overlayOpacity"></div>
    <div class="pcb-content">
      <div class="pcb-top">
        <span class="pcb-badge" *ngIf="product.discount && product.discount > 0">-{{ product.discount | number:'1.0-0' }}%</span>
        <span class="pcb-type" *ngIf="product.tipo === 'manipulado'">Manipulado</span>
      </div>
      <h3 class="pcb-title" [class.lines-3]="titleLines === 3" [title]="product.name">{{ product.name }}</h3>
      <p class="pcb-marca" *ngIf="product.marca">{{ product.marca }}</p>
      <div class="pcb-price">
        <span class="pcb-new">{{ priceNow | currency:'BRL':'symbol-narrow':'1.2-2':'pt-BR' }}</span>
        <span class="pcb-old" *ngIf="oldPriceDisplay != null">{{ oldPriceDisplay | currency:'BRL':'symbol-narrow':'1.2-2':'pt-BR' }}</span>
      </div>
    </div>
    <button type="button" class="pcb-fav" *ngIf="supportsFavorites" (click)="onFavClick($event)" [attr.aria-pressed]="favoriteActive ?? product.isFavorited">
      <span>{{ (favoriteActive ?? product.isFavorited) ? '❤️' : '🤍' }}</span>
    </button>
    <button type="button" class="pcb-add" (click)="onAddClick($event)" [attr.aria-label]="'Adicionar ' + product.name">
      <img src="/icones/carrinho.png" width="28" height="28" alt="" />
    </button>
  </div>
</ng-template>

<a *ngIf="!disableLink" class="pcb-root" [routerLink]="['/produto', product.id]" [queryParams]="{ src: 'loja' }" [title]="product.name" style="width:100%" [style.max-width]="cardWidth">
  <ng-container *ngTemplateOutlet="bannerInner"></ng-container>
</a>
<div *ngIf="disableLink" class="pcb-root" style="width:100%" [style.max-width]="cardWidth">
  <ng-container *ngTemplateOutlet="bannerInner"></ng-container>
</div>
